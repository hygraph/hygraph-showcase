query GetArticles($locale: Locale!) {
  articles(
    locales: [$locale, en]
    stage: DRAFT
    orderBy: publishedDate_DESC
    first: 50
  ) {
    id
    slug
    title
    category
    publishedDate
    readTime
    summary
    image {
      url(
        transformation: {
          image: { resize: { width: 1200, fit: clip }, quality: { value: 85 } }
          validateOptions: true
        }
      )
      width
      height
    }
  }
}

query GetArticle($slug: String!, $locale: Locale!, $segmentId: ID) {
  article(where: { slug: $slug }, locales: [$locale, en], stage: DRAFT) {
    id
    slug
    title
    category
    publishedDate
    readTime
    summary
    image {
      url(
        transformation: {
          image: { resize: { width: 1600, fit: clip }, quality: { value: 85 } }
          validateOptions: true
        }
      )
      width
      height
    }
    content {
      ... on ArticleParagraph {
        __typename
        id
        paragraphText: text {
          html
        }
      }
      ... on ArticleImageSection {
        __typename
        id
        image {
          url(
            transformation: {
              image: {
                resize: { width: 1200, fit: clip }
                quality: { value: 85 }
              }
              validateOptions: true
            }
          )
          width
          height
        }
        caption
        imageSectionText: text {
          html
        }
      }
      ... on ArticleProductCallout {
        __typename
        id
        headline
        calloutText: text {
          html
        }
        product {
          id
          slug
          name
          image {
            url(
              transformation: {
                image: {
                  resize: { width: 400, fit: clip }
                  quality: { value: 85 }
                }
                validateOptions: true
              }
            )
            width
            height
          }
        }
      }
    }
    variants(where: { segments_some: { id: $segmentId } }) {
      title
      summary
      content {
        ... on ArticleParagraph {
          __typename
          id
          paragraphText: text {
            html
          }
        }
        ... on ArticleImageSection {
          __typename
          id
          image {
            url(
              transformation: {
                image: {
                  resize: { width: 1200, fit: clip }
                  quality: { value: 85 }
                }
                validateOptions: true
              }
            )
            width
            height
          }
          caption
          imageSectionText: text {
            html
          }
        }
        ... on ArticleProductCallout {
          __typename
          id
          headline
          calloutText: text {
            html
          }
          product {
            id
            slug
            name
            image {
              url(
                transformation: {
                  image: {
                    resize: { width: 400, fit: clip }
                    quality: { value: 85 }
                  }
                  validateOptions: true
                }
              )
              width
              height
            }
          }
        }
      }
    }
  }
}
