query GetArticles {
  articles(stage: DRAFT, orderBy: publishedDate_DESC, first: 20) {
    id
    slug
    title
    category
    publishedDate
    readTime
    summary
    image {
      url
      width
      height
    }
  }
}

query GetArticle($slug: String!) {
  article(where: { slug: $slug }, stage: DRAFT) {
    id
    slug
    title
    category
    publishedDate
    readTime
    summary
    image {
      url
      width
      height
    }
    body {
      html
    }
  }
}
