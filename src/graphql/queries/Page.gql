query GetPage($slug: String!, $locale: Locale!, $segmentId: ID) {
  pages(
    where: { slug: $slug }
    locales: [$locale, en]
    stage: DRAFT
    first: 1
  ) {
    id
    title
    slug
    sections {
      __typename
      ... on PageHeader {
        id
        subtitle
        eyebrow
        pageHeaderTitle: title
      }
      ... on ArticleList {
        id
        articleListHeadline: headline
      }
      ... on FeaturedArticle {
        id
        ctaLabel
        imageRight
        blogPost {
          id
          slug
          title
          category
          publishedDate
          readTime
          summary
          image {
            url(
              transformation: {
                image: {
                  resize: { width: 1600, fit: clip }
                  quality: { value: 85 }
                }
                validateOptions: true
              }
            )
            width
            height
          }
        }
      }
      ... on JobList {
        id
        label
        cta
        emptyStatePlaceholder
        titleWithCount
      }
      ... on HeroSection {
        id
        label
        headline
        subheadline
        mediaText
        backgroundMedia {
          id
          url(
            transformation: {
              image: {
                resize: { width: 1200, fit: clip }
                quality: { value: 85 }
              }
              validateOptions: true
            }
          )
          width
          height
        }
        primaryCTA {
          id
          label
          href
          variant
          openInNewTab
        }
        secondaryCTA {
          id
          label
          href
          variant
          openInNewTab
        }
      }
      ... on FeatureGrid {
        id
        layout
        features {
          id
          title
          description {
            text
          }
        }
      }
      ... on EditorialSection {
        id
        eyebrow
        editorialHeadline: headline
        body {
          html
        }
        image {
          id
          url(
            transformation: {
              image: {
                resize: { width: 1600, fit: clip }
                quality: { value: 85 }
              }
              validateOptions: true
            }
          )
          width
          height
        }
        imageRight
        ctaLabel
        ctaHref
        stats {
          id
          value
          label
        }
      }
      ... on CTABlock {
        id
        headline
        description {
          text
        }
        backgroundColor
        primaryButton {
          id
          label
          href
          variant
          openInNewTab
        }
        secondaryButton {
          id
          label
          href
          variant
          openInNewTab
        }
      }
      ... on ProductShowcase {
        id
        layout
        displayFilters
        showPrices
        showStock
        productsToShow
      }
      ... on StatsBar {
        id
        statsLayout: layout
        stats {
          id
          value
          label
        }
      }
      ... on SectionHeader {
        id
        label
        sectionHeadingHeadline: headline
      }
      ... on Timeline {
        id
        entries {
          id
          year
          event
        }
      }
      ... on ContactSection {
        id
        topics
        nameLabel
        namePlaceholder
        emailLabel
        emailPlaceholder
        topicLabel
        topicPlaceholder
        messageLabel
        messagePlaceholder
        submitLabel
        successHeadline
        successBody
        offices {
          id
          city
          role
          address
          email
          phone
        }
      }
    }
    variants(where: { segments_some: { id: $segmentId } }) {
      sections {
        __typename
        ... on PageHeader {
          id
          eyebrow
          pageHeaderTitle: title
          subtitle
        }
        ... on ArticleList {
          id
        }
        ... on FeaturedArticle {
          id
          ctaLabel
          imageRight
          blogPost {
            id
            slug
            title
            category
            publishedDate
            readTime
            summary
            image {
              url(
                transformation: {
                  image: {
                    resize: { width: 1600, fit: clip }
                    quality: { value: 85 }
                  }
                  validateOptions: true
                }
              )
              width
              height
            }
          }
        }
        ... on JobList {
          id
          label
          cta
          emptyStatePlaceholder
          titleWithCount
        }
        ... on HeroSection {
          id
          headline
          subheadline
          mediaText
          backgroundMedia {
            id
            url(
              transformation: {
                image: {
                  resize: { width: 1200, fit: clip }
                  quality: { value: 85 }
                }
                validateOptions: true
              }
            )
            width
            height
          }
          primaryCTA {
            id
            label
            href
            variant
            openInNewTab
          }
          secondaryCTA {
            id
            label
            href
            variant
            openInNewTab
          }
        }
        ... on FeatureGrid {
          id
          layout
          features {
            id
            title
            description {
              text
            }
          }
        }
        ... on EditorialSection {
          id
          eyebrow
          editorialHeadline: headline
          body {
            html
          }
          image {
            id
            url(
              transformation: {
                image: {
                  resize: { width: 1600, fit: clip }
                  quality: { value: 85 }
                }
                validateOptions: true
              }
            )
            width
            height
          }
          imageRight
          ctaLabel
          ctaHref
          stats {
            id
            value
            label
          }
        }
        ... on CTABlock {
          id
          headline
          description {
            text
          }
          backgroundColor
          primaryButton {
            id
            label
            href
            variant
            openInNewTab
          }
          secondaryButton {
            id
            label
            href
            variant
            openInNewTab
          }
        }
        ... on ProductShowcase {
          id
          layout
          displayFilters
          showPrices
          showStock
          productsToShow
        }
        ... on StatsBar {
          id
          statsLayout: layout
          stats {
            id
            value
            label
          }
        }
        ... on SectionHeader {
          id
          label
          sectionHeadingHeadline: headline
        }
        ... on Timeline {
          id
          entries {
            id
            year
            event
          }
        }
        ... on ContactSection {
          id
          topics
          nameLabel
          namePlaceholder
          emailLabel
          emailPlaceholder
          topicLabel
          topicPlaceholder
          messageLabel
          messagePlaceholder
          submitLabel
          successHeadline
          successBody
          offices {
            id
            city
            role
            address
            email
            phone
          }
        }
      }
    }
    seo {
      metaTitle
      metaDescription
      ogImage {
        id
        url
        width
        height
      }
    }
  }
}
