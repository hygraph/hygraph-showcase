query GetPage($slug: String!, $locale: Locale!, $segmentName: String) {
  pages(
    where: { slug: $slug }
    locales: [$locale, en]
    stage: DRAFT
    first: 1
  ) {
    id
    title
    slug
    sections {
      __typename
      ... on PageHeader {
        id
        subtitle
        eyebrow
        pageHeaderTitle: title
      }
      ... on ProductGrid {
        id
      }
      ... on BlogList {
        id
      }
      ... on JobList {
        id
      }
      ... on HeroSection {
        id
        headline
        subheadline
        mediaText
        backgroundMedia {
          id
          url
          width
          height
        }
        textAlignment
        primaryCTA {
          id
          label
          href
          variant
          openInNewTab
        }
        secondaryCTA {
          id
          label
          href
          variant
          openInNewTab
        }
      }
      ... on FeatureGrid {
        id
        title
        layout
        features {
          id
          title
          description {
            text
          }
          icon {
            id
            url
            width
            height
          }
        }
      }
      ... on EditorialSection {
        id
        eyebrow
        editorialHeadline: headline
        body {
          html
        }
        image {
          id
          url
          width
          height
        }
        imageRight
        ctaLabel
        ctaHref
        stats {
          id
          value
          label
        }
      }
      ... on CTABlock {
        id
        headline
        description {
          text
        }
        backgroundColor
        primaryButton {
          id
          label
          href
          variant
          openInNewTab
        }
        secondaryButton {
          id
          label
          href
          variant
          openInNewTab
        }
      }
      ... on ProductShowcase {
        id
        title
        layout
        productLine {
          id
          slug
          name
        }
        filterByAudience
        showPrices
        showStock
        itemsPerRow
      }
      ... on StatsBar {
        id
        title
        statsLayout: layout
        backgroundColor
        stats {
          id
          value
          label
          icon {
            id
            url
            width
            height
          }
        }
      }
    }
    variants(where: { segments_some: { name: $segmentName } }) {
      sections {
        __typename
        ... on PageHeader {
          id
          eyebrow
          pageHeaderTitle: title
          subtitle
        }
        ... on ProductGrid {
          id
        }
        ... on BlogList {
          id
        }
        ... on JobList {
          id
        }
        ... on HeroSection {
          id
          headline
          subheadline
          mediaText
          backgroundMedia {
            id
            url
            width
            height
          }
          textAlignment
          primaryCTA {
            id
            label
            href
            variant
            openInNewTab
          }
          secondaryCTA {
            id
            label
            href
            variant
            openInNewTab
          }
        }
        ... on FeatureGrid {
          id
          title
          layout
          features {
            id
            title
            description {
              text
            }
            icon {
              id
              url
              width
              height
            }
          }
        }
        ... on EditorialSection {
          id
          eyebrow
          editorialHeadline: headline
          body {
            html
          }
          image {
            id
            url
            width
            height
          }
          imageRight
          ctaLabel
          ctaHref
          stats {
            id
            value
            label
          }
        }
        ... on CTABlock {
          id
          headline
          description {
            text
          }
          backgroundColor
          primaryButton {
            id
            label
            href
            variant
            openInNewTab
          }
          secondaryButton {
            id
            label
            href
            variant
            openInNewTab
          }
        }
        ... on ProductShowcase {
          id
          title
          layout
          productLine {
            id
            slug
            name
          }
          filterByAudience
          showPrices
          showStock
          itemsPerRow
        }
        ... on StatsBar {
          id
          title
          statsLayout: layout
          backgroundColor
          stats {
            id
            value
            label
            icon {
              id
              url
              width
              height
            }
          }
        }
      }
    }
    seo {
      metaTitle
      metaDescription
      ogImage {
        id
        url
        width
        height
      }
    }
  }
}
