query GetPage($slug: String!, $locale: Locale!, $segmentName: String) {
  pages(
    where: { slug: $slug }
    locales: [$locale, en]
    stage: DRAFT
    first: 1
  ) {
    id
    title
    slug
    sections {
      __typename
      ... on PageHeader {
        id
        subtitle
        eyebrow
        pageHeaderTitle: title
      }
      ... on ArticleList {
        id
        blogListHeadline: headline
        posts {
          id
          slug
          title
          category
          publishedDate
          readTime
          summary
          image {
            url
            width
            height
          }
        }
      }
      ... on FeaturedArticle {
        id
        ctaLabel
        imageRight
        blogPost {
          id
          slug
          title
          category
          publishedDate
          readTime
          summary
          image {
            url
            width
            height
          }
        }
      }
      ... on JobList {
        id
        jobs {
          id
          slug
          title
          department
          location
          jobType
          summary
        }
      }
      ... on HeroSection {
        id
        label
        headline
        subheadline
        mediaText
        backgroundMedia {
          id
          url
          width
          height
        }
        textAlignment
        primaryCTA {
          id
          label
          href
          variant
          openInNewTab
        }
        secondaryCTA {
          id
          label
          href
          variant
          openInNewTab
        }
      }
      ... on FeatureGrid {
        id
        layout
        features {
          id
          title
          description {
            text
          }
        }
      }
      ... on EditorialSection {
        id
        eyebrow
        editorialHeadline: headline
        body {
          html
        }
        image {
          id
          url
          width
          height
        }
        imageRight
        ctaLabel
        ctaHref
        stats {
          id
          value
          label
        }
      }
      ... on CTABlock {
        id
        headline
        description {
          text
        }
        backgroundColor
        primaryButton {
          id
          label
          href
          variant
          openInNewTab
        }
        secondaryButton {
          id
          label
          href
          variant
          openInNewTab
        }
      }
      ... on ProductShowcase {
        id
        layout
        filterByAudience
        displayFilters
        showPrices
        showStock
        products {
          id
          slug
          name
          tagline
          category {
            value
          }
          image {
            url
            width
            height
          }
          externalProduct {
            data {
              calculated_price
              sale_price
              inventory_level
              availability
            }
          }
        }
      }
      ... on StatsBar {
        id
        statsLayout: layout
        stats {
          id
          value
          label
        }
      }
      ... on SectionHeader {
        id
        label
        sectionHeadingHeadline: headline
      }
      ... on Timeline {
        id
        entries {
          id
          year
          event
        }
      }
      ... on ContactSection {
        id
        topics
        nameLabel
        namePlaceholder
        emailLabel
        emailPlaceholder
        topicLabel
        topicPlaceholder
        messageLabel
        messagePlaceholder
        submitLabel
        successHeadline
        successBody
        offices {
          id
          city
          role
          address
          email
          phone
        }
      }
    }
    variants(where: { segments_some: { name: $segmentName } }) {
      sections {
        __typename
        ... on PageHeader {
          id
          eyebrow
          pageHeaderTitle: title
          subtitle
        }
        ... on ArticleList {
          id
          posts {
            id
            slug
            title
            category
            publishedDate
            readTime
            summary
            image {
              url
              width
              height
            }
          }
        }
        ... on FeaturedArticle {
          id
          ctaLabel
          imageRight
          blogPost {
            id
            slug
            title
            category
            publishedDate
            readTime
            summary
            image {
              url
              width
              height
            }
          }
        }
        ... on JobList {
          id
          jobs {
            id
            slug
            title
            department
            location
            jobType
            summary
          }
        }
        ... on HeroSection {
          id
          headline
          subheadline
          mediaText
          backgroundMedia {
            id
            url
            width
            height
          }
          textAlignment
          primaryCTA {
            id
            label
            href
            variant
            openInNewTab
          }
          secondaryCTA {
            id
            label
            href
            variant
            openInNewTab
          }
        }
        ... on FeatureGrid {
          id
          layout
          features {
            id
            title
            description {
              text
            }
          }
        }
        ... on EditorialSection {
          id
          eyebrow
          editorialHeadline: headline
          body {
            html
          }
          image {
            id
            url
            width
            height
          }
          imageRight
          ctaLabel
          ctaHref
          stats {
            id
            value
            label
          }
        }
        ... on CTABlock {
          id
          headline
          description {
            text
          }
          backgroundColor
          primaryButton {
            id
            label
            href
            variant
            openInNewTab
          }
          secondaryButton {
            id
            label
            href
            variant
            openInNewTab
          }
        }
        ... on ProductShowcase {
          id
          layout
          filterByAudience
          displayFilters
          showPrices
          showStock
          products {
            id
            slug
            name
            tagline
            category {
              value
            }
            image {
              url
              width
              height
            }
            externalProduct {
              data {
                calculated_price
                sale_price
                inventory_level
                availability
              }
            }
          }
        }
        ... on StatsBar {
          id
          statsLayout: layout
          stats {
            id
            value
            label
          }
        }
        ... on SectionHeader {
          id
          label
          sectionHeadingHeadline: headline
        }
        ... on Timeline {
          id
          entries {
            id
            year
            event
          }
        }
        ... on ContactSection {
          id
          topics
          nameLabel
          namePlaceholder
          emailLabel
          emailPlaceholder
          topicLabel
          topicPlaceholder
          messageLabel
          messagePlaceholder
          submitLabel
          successHeadline
          successBody
          offices {
            id
            city
            role
            address
            email
            phone
          }
        }
      }
    }
    seo {
      metaTitle
      metaDescription
      ogImage {
        id
        url
        width
        height
      }
    }
  }
}
