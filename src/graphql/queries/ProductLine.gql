query GetProductLine($slug: String!, $locale: Locale!, $segmentName: String) {
  productLine(where: { slug: $slug }, locales: [$locale, en], stage: DRAFT) {
    id
    name
    slug
    tagline
    description {
      text
    }
    heroImage {
      id
      url
      width
      height
    }
    keyFeatures {
      id
      title
      description {
        text
      }
      icon {
        id
        url
        width
        height
      }
    }
    testimonials {
      id
      quote
      author
      role
      rating
      avatar {
        id
        url
        width
        height
      }
    }
    variants(where: { segments_some: { name: $segmentName } }) {
      tagline
      description {
        text
      }
      heroImage {
        id
        url
        width
        height
      }
    }
    seo {
      metaTitle
      metaDescription
      ogImage {
        id
        url
        width
        height
      }
    }
  }
}
