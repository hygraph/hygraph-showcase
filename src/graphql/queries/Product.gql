query GetProductBySlug($slug: String!, $locale: Locale!) {
  product(where: { slug: $slug }, locales: [$locale, en], stage: DRAFT) {
    id
    slug
    name
    tagline
    bikeCategory
    category {
      value
    }
    imageUrl
    productFeatures
    featured
    specifications {
      frame
      weight
      groupset
      wheels
    }
    externalProductId
    externalProduct {
      data {
        calculated_price
        sale_price
        inventory_level
        availability
      }
    }
  }
}
