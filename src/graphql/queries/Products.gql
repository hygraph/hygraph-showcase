query GetProducts($locale: Locale!) {
  products(locales: [$locale, en], stage: DRAFT, first: 20) {
    id
    slug
    name
    tagline
    category {
      value
    }
    image {
      url
      width
      height
    }
    productFeatures
    featured
    specifications {
      frame
      motor
      battery
      range
      weight
      groupset
      gears
      brakes
      suspension
      wheelSize
      wheels
    }
    externalProductId
    externalProduct {
      data {
        calculated_price
        sale_price
        inventory_level
        availability
      }
    }
  }
}

query GetFeaturedProducts($locale: Locale!) {
  products(
    locales: [$locale, en]
    stage: DRAFT
    first: 4
    where: { featured: true }
  ) {
    id
    slug
    name
    tagline
    category {
      value
    }
    image {
      url
      width
      height
    }
    productFeatures
    specifications {
      frame
      motor
      battery
      range
      weight
      groupset
      gears
      brakes
      suspension
      wheelSize
      wheels
    }
    externalProduct {
      data {
        calculated_price
        sale_price
        inventory_level
        availability
      }
    }
  }
}

query GetProductCategories {
  products(stage: DRAFT, first: 100) {
    category {
      value
    }
  }
}
